name: 更新無人機空域圖資

on:
  schedule:
    - cron: "15 16 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 取得原始碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 從民航局同步圖資（GeoJSON + KML）
        run: python3 scripts/sync_airspace.py --output-dir ./public/data

      - name: 設定 Pages
        uses: actions/configure-pages@v5

      - name: 上傳網站內容
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
